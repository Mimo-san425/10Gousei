<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10の合成 もぐらたたき</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f7fbff;
    color: #222;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  .top-area {
    height: 30%;
    background: linear-gradient(to bottom, #e8f6ff, #ffffff);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    border-bottom: 4px solid #cfe8ff;
  }
  .title {
    font-size: clamp(24px, 3.5vw, 40px);
    font-weight: bold;
    margin-bottom: 10px;
  }
  .equation {
    font-size: clamp(42px, 8vw, 86px);
    font-weight: bold;
    background: #fff8d9;
    border: 5px solid #f3d76b;
    border-radius: 20px;
    padding: 16px 28px;
    min-width: 320px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .message {
    margin-top: 12px;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: bold;
    color: #1a73e8;
    min-height: 1.5em;
    text-align: center;
  }
  .bottom-area {
    height: 70%;
    background: linear-gradient(to bottom, #dff4d8, #b7df9f);
    padding: 10px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mode-row,
  .controls,
  .manual-panel {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    font-size: clamp(17px, 2.1vw, 26px);
    padding: 10px 16px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    background: #4caf50;
    color: white;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
  }
  button.secondary { background: #5c6bc0; }
  button.orange { background: #fb8c00; }
  button.gray { background: #78909c; }
  button.mode-btn {
    background: #d9e8f8;
    color: #234;
    border: 3px solid #a9c7e8;
    box-shadow: none;
  }
  button.mode-btn.active {
    background: #1e88e5;
    color: white;
    border-color: #1565c0;
  }
  .status {
    text-align: center;
    font-size: clamp(18px, 2.2vw, 28px);
    font-weight: bold;
  }
  .speed-box,
  .manual-wrap {
    background: rgba(255,255,255,0.82);
    border-radius: 16px;
    padding: 8px 10px;
  }
  .speed-box {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .speed-box.hide {
    display: none;
  }
  .speed-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(15px, 1.8vw, 22px);
    font-weight: bold;
    color: #333;
  }
  .speed-item input[type="range"] {
    width: 220px;
    accent-color: #1e88e5;
  }
  .manual-wrap {
    display: none;
  }
  .manual-wrap.show {
    display: block;
  }
  .manual-title {
    text-align: center;
    font-size: clamp(16px, 2vw, 24px);
    font-weight: bold;
    margin-bottom: 8px;
    color: #333;
  }
  .manual-panel button {
    min-width: 58px;
    min-height: 58px;
    padding: 0;
    font-size: 0;
    background: #8e24aa;
    color: transparent;
  }
  .board {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    align-items: end;
    justify-items: center;
    padding: 6px 8px 12px;
  }
  .hole {
    width: min(20vw, 150px);
    height: min(14vw, 96px);
    max-height: 96px;
    background: radial-gradient(ellipse at center, #5d4037 0%, #3e2723 75%);
    border-radius: 50%;
    position: relative;
    overflow: visible;
    box-shadow: inset 0 8px 10px rgba(0,0,0,0.3);
  }
  .mole {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translate(-50%, 120%);
    width: min(15vw, 100px);
    height: min(15vw, 100px);
    max-width: 100px;
    max-height: 100px;
    border-radius: 20px;
    background: white;
    border: 4px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(34px, 5vw, 58px);
    font-weight: bold;
    box-shadow: 0 8px 12px rgba(0,0,0,0.2);
    transition: transform 0.18s ease;
    pointer-events: none;
  }
  .mole.show {
    transform: translate(-50%, -18%);
    pointer-events: auto;
  }
  .mole.correct {
    background: #d9ffd9;
    border-color: #2e7d32;
  }
  .mole.wrong {
    background: #ffd9d9;
    border-color: #c62828;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .overlay.show {
    display: flex;
  }
  .overlay-card {
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    width: min(90vw, 560px);
    text-align: center;
    box-shadow: 0 12px 24px rgba(0,0,0,0.25);
  }
  .overlay-title {
    font-size: clamp(34px, 6vw, 60px);
    font-weight: bold;
    margin-bottom: 12px;
    color: #e65100;
  }
  .overlay-text {
    font-size: clamp(22px, 3vw, 32px);
    margin-bottom: 18px;
  }
  .overlay-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  @media (max-width: 800px) {
    .board {
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .hole {
      width: 20vw;
      height: 13vw;
    }
    .manual-panel button {
      min-width: 52px;
      min-height: 52px;
    }
    .speed-item input[type="range"] {
      width: 150px;
    }
  }
</style>
</head>
<body>

<div class="top-area">
  <div class="title">10の ごうせい</div>
  <div id="equation" class="equation">3 + □ = 10</div>
  <div id="message" class="message">したから こたえを たたこう！</div>
</div>

<div class="bottom-area">
  <div class="mode-row">
    <button id="autoModeBtn" class="mode-btn active">自動</button>
    <button id="manualModeBtn" class="mode-btn">手動</button>
  </div>

  <div class="controls">
    <button id="startBtn">スタート</button>
    <button id="pauseBtn" class="secondary">いったん とめる</button>
    <button id="nextBtn" class="orange">つぎへ</button>
    <button id="retryBtn" class="secondary">もういちど</button>
    <button id="clearBtn" class="gray">けす</button>
  </div>

  <div class="status">
    もんだい <span id="currentIndex">1</span> / <span id="totalCount">10</span>
  </div>

  <div id="speedBox" class="speed-box">
    <div class="speed-item">
      自動のはやさ
      <input id="autoSpeedSlider" type="range" min="700" max="2500" step="100" value="1500">
      <span id="autoSpeedValue">1500ms</span>
    </div>
  </div>

  <div id="manualWrap" class="manual-wrap">
    <div class="manual-title">手動モード</div>
    <div id="manualPanel" class="manual-panel"></div>
  </div>

  <div id="board" class="board"></div>
</div>

<div id="overlay" class="overlay">
  <div class="overlay-card">
    <div id="overlayTitle" class="overlay-title">せいかい！</div>
    <div id="overlayText" class="overlay-text">よくできました</div>
    <div class="overlay-buttons">
      <button id="overlayNextBtn">つぎのもんだい</button>
      <button id="overlayRetryBtn" class="secondary">もういちど</button>
    </div>
  </div>
</div>

<script>
const problems = [
  { count: 1 },
  { count: 2 },
  { count: 3 },
  { count: 4 },
  { count: 5 },
  { count: 6 },
  { count: 7 },
  { count: 8 },
  { count: 9 },
  { count: 4 }
];

const HOLE_COUNT = 8;
const CORRECT_APPEAR_RATE = 0.28;
const MANUAL_SHOW_DURATION = 1600;

const board = document.getElementById("board");
const equation = document.getElementById("equation");
const message = document.getElementById("message");
const currentIndexEl = document.getElementById("currentIndex");
const totalCountEl = document.getElementById("totalCount");

const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayText = document.getElementById("overlayText");
const overlayNextBtn = document.getElementById("overlayNextBtn");
const overlayRetryBtn = document.getElementById("overlayRetryBtn");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const nextBtn = document.getElementById("nextBtn");
const retryBtn = document.getElementById("retryBtn");
const clearBtn = document.getElementById("clearBtn");

const autoModeBtn = document.getElementById("autoModeBtn");
const manualModeBtn = document.getElementById("manualModeBtn");
const manualWrap = document.getElementById("manualWrap");
const manualPanel = document.getElementById("manualPanel");
const speedBox = document.getElementById("speedBox");

const autoSpeedSlider = document.getElementById("autoSpeedSlider");
const autoSpeedValue = document.getElementById("autoSpeedValue");

let currentProblemIndex = 0;
let spawnTimer = null;
let running = false;
let holes = [];
let mode = "auto";

function getAutoInterval() {
  return Number(autoSpeedSlider.value);
}

function getAutoDuration() {
  return Math.max(Number(autoSpeedSlider.value) + 400, 1100);
}

function updateSpeedLabel() {
  autoSpeedValue.textContent = `${autoSpeedSlider.value}ms`;
}

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function correctAnswer() {
  return 10 - problems[currentProblemIndex].count;
}

function buildBoard() {
  board.innerHTML = "";
  holes = [];

  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement("div");
    hole.className = "hole";

    const mole = document.createElement("div");
    mole.className = "mole";
    mole.textContent = "";

    mole.addEventListener("pointerdown", () => {
      if (!mole.classList.contains("show")) return;
      handleTap(mole);
    });

    hole.appendChild(mole);
    board.appendChild(hole);
    holes.push({ hole, mole, timer: null, busy: false });
  }
}

function buildManualPanel() {
  manualPanel.innerHTML = "";
  for (let n = 0; n <= 10; n++) {
    const btn = document.createElement("button");
    btn.setAttribute("aria-label", String(n));
    btn.dataset.value = String(n);
    btn.addEventListener("click", () => {
      if (mode !== "manual") return;
      spawnSpecificNumber(Number(btn.dataset.value));
    });
    manualPanel.appendChild(btn);
  }
}

function loadProblem(index) {
  currentProblemIndex = index;
  const p = problems[currentProblemIndex];

  equation.textContent = `${p.count} + □ = 10`;
  currentIndexEl.textContent = currentProblemIndex + 1;
  totalCountEl.textContent = problems.length;

  hideOverlay();
  clearMoles();
  pauseGame();

  if (mode === "manual") {
    message.textContent = "手動モード";
  } else {
    message.textContent = "したから こたえを たたこう！";
  }
}

function clearMoles() {
  holes.forEach(h => {
    clearTimeout(h.timer);
    h.busy = false;
    h.mole.className = "mole";
    h.mole.textContent = "";
  });
}

function startGame() {
  if (mode === "manual") {
    message.textContent = "手動モード";
    running = false;
    return;
  }

  if (running) return;
  running = true;
  message.textContent = "したから こたえを たたこう！";
  spawnLoop();
  restartAutoTimer();
}

function restartAutoTimer() {
  clearInterval(spawnTimer);
  spawnTimer = setInterval(() => {
    if (mode !== "auto" || !running) return;
    spawnLoop();
  }, getAutoInterval());
}

function pauseGame() {
  running = false;
  clearInterval(spawnTimer);
  spawnTimer = null;
}

function retryProblem() {
  pauseGame();
  loadProblem(currentProblemIndex);
  if (mode === "auto") {
    startGame();
  }
}

function nextProblem() {
  pauseGame();
  if (currentProblemIndex < problems.length - 1) {
    loadProblem(currentProblemIndex + 1);
    if (mode === "auto") {
      startGame();
    }
  } else {
    showOverlay("おしまい！", "ぜんぶ できました！");
  }
}

function getWrongNumbers(target) {
  const nums = [];
  for (let i = 0; i <= 10; i++) {
    if (i !== target) nums.push(i);
  }
  return shuffle(nums);
}

function findFreeHole() {
  const freeHoles = holes.filter(h => !h.busy);
  if (freeHoles.length === 0) return null;
  return freeHoles[Math.floor(Math.random() * freeHoles.length)];
}

function showNumberInHole(holeObj, value, duration) {
  if (!holeObj) return;
  const mole = holeObj.mole;

  holeObj.busy = true;
  clearTimeout(holeObj.timer);
  mole.className = "mole";
  mole.textContent = value;
  mole.classList.add("show");

  holeObj.timer = setTimeout(() => {
    mole.className = "mole";
    mole.textContent = "";
    holeObj.busy = false;
  }, duration);
}

function spawnSpecificNumber(value) {
  const hole = findFreeHole();
  if (!hole) return;
  showNumberInHole(hole, value, MANUAL_SHOW_DURATION);
}

function spawnLoop() {
  const hole = findFreeHole();
  if (!hole) return;

  const target = correctAnswer();
  const wrongs = getWrongNumbers(target);

  let value;
  if (Math.random() < CORRECT_APPEAR_RATE) {
    value = target;
  } else {
    value = wrongs[Math.floor(Math.random() * wrongs.length)];
  }

  showNumberInHole(hole, value, getAutoDuration());
}

function handleTap(mole) {
  const tapped = Number(mole.textContent);
  const target = correctAnswer();

  if (tapped === target) {
    mole.classList.remove("wrong");
    mole.classList.add("correct");
    message.textContent = "せいかい！";
    pauseGame();
    setTimeout(() => {
      showOverlay("せいかい！", `${problems[currentProblemIndex].count} と ${target} で 10`);
    }, 250);
  } else {
    mole.classList.remove("correct");
    mole.classList.add("wrong");
    message.textContent = "ちがうよ";
    setTimeout(() => {
      if (!overlay.classList.contains("show")) {
        if (mode === "manual") {
          message.textContent = "手動モード";
        } else {
          message.textContent = "したから こたえを たたこう！";
        }
      }
    }, 500);
  }
}

function setMode(newMode) {
  mode = newMode;
  pauseGame();
  clearMoles();
  hideOverlay();

  if (mode === "auto") {
    autoModeBtn.classList.add("active");
    manualModeBtn.classList.remove("active");
    manualWrap.classList.remove("show");
    speedBox.classList.remove("hide");
    message.textContent = "したから こたえを たたこう！";
  } else {
    manualModeBtn.classList.add("active");
    autoModeBtn.classList.remove("active");
    manualWrap.classList.add("show");
    speedBox.classList.add("hide");
    message.textContent = "手動モード";
  }
}

function showOverlay(title, text) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  overlay.classList.add("show");
}

function hideOverlay() {
  overlay.classList.remove("show");
}

startBtn.addEventListener("click", startGame);
pauseBtn.addEventListener("click", pauseGame);
nextBtn.addEventListener("click", nextProblem);
retryBtn.addEventListener("click", retryProblem);
clearBtn.addEventListener("click", clearMoles);

autoModeBtn.addEventListener("click", () => setMode("auto"));
manualModeBtn.addEventListener("click", () => setMode("manual"));

overlayNextBtn.addEventListener("click", () => {
  hideOverlay();
  nextProblem();
});
overlayRetryBtn.addEventListener("click", () => {
  hideOverlay();
  retryProblem();
});

autoSpeedSlider.addEventListener("input", () => {
  updateSpeedLabel();
  if (mode === "auto" && running) {
    restartAutoTimer();
  }
});

buildBoard();
buildManualPanel();
updateSpeedLabel();
loadProblem(0);
setMode("auto");
</script>

</body>
</html>
