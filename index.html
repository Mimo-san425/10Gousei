<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10の合成 もぐらたたき</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f7fbff;
    color: #222;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .top-area {
    height: 34%;
    background: linear-gradient(to bottom, #e8f6ff, #ffffff);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    border-bottom: 4px solid #cfe8ff;
  }

  .title {
    font-size: clamp(26px, 4vw, 42px);
    font-weight: bold;
    margin-bottom: 14px;
  }

  .equation {
    font-size: clamp(44px, 8vw, 88px);
    font-weight: bold;
    background: #fff8d9;
    border: 5px solid #f3d76b;
    border-radius: 20px;
    padding: 18px 32px;
    min-width: 320px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }

  .message {
    margin-top: 14px;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: bold;
    color: #1a73e8;
    min-height: 1.5em;
    text-align: center;
  }

  .bottom-area {
    height: 66%;
    background: linear-gradient(to bottom, #dff4d8, #b7df9f);
    padding: 12px;
    display: flex;
    flex-direction: column;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  button {
    font-size: clamp(18px, 2.2vw, 28px);
    padding: 10px 18px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    background: #4caf50;
    color: white;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
  }

  button.secondary {
    background: #5c6bc0;
  }

  button.orange {
    background: #fb8c00;
  }

  .status {
    text-align: center;
    font-size: clamp(18px, 2.2vw, 28px);
    font-weight: bold;
    margin-bottom: 10px;
  }

  .board {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    align-items: end;
    justify-items: center;
    padding: 8px 10px 14px;
  }

  .hole {
    width: min(20vw, 150px);
    height: min(14vw, 96px);
    max-height: 96px;
    background: radial-gradient(ellipse at center, #5d4037 0%, #3e2723 75%);
    border-radius: 50%;
    position: relative;
    overflow: visible;
    box-shadow: inset 0 8px 10px rgba(0,0,0,0.3);
  }

  .mole {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translate(-50%, 120%);
    width: min(15vw, 100px);
    height: min(15vw, 100px);
    max-width: 100px;
    max-height: 100px;
    border-radius: 20px;
    background: white;
    border: 4px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(34px, 5vw, 58px);
    font-weight: bold;
    box-shadow: 0 8px 12px rgba(0,0,0,0.2);
    transition: transform 0.16s ease;
    pointer-events: none;
  }

  .mole.show {
    transform: translate(-50%, -18%);
    pointer-events: auto;
  }

  .mole.correct {
    background: #d9ffd9;
    border-color: #2e7d32;
  }

  .mole.wrong {
    background: #ffd9d9;
    border-color: #c62828;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .overlay.show {
    display: flex;
  }

  .overlay-card {
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    width: min(90vw, 560px);
    text-align: center;
    box-shadow: 0 12px 24px rgba(0,0,0,0.25);
  }

  .overlay-title {
    font-size: clamp(34px, 6vw, 60px);
    font-weight: bold;
    margin-bottom: 12px;
    color: #e65100;
  }

  .overlay-text {
    font-size: clamp(22px, 3vw, 32px);
    margin-bottom: 18px;
  }

  .overlay-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  @media (max-width: 800px) {
    .board {
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .hole {
      width: 20vw;
      height: 13vw;
    }
  }
</style>
</head>
<body>

<div class="top-area">
  <div class="title">10の ごうせい</div>
  <div id="equation" class="equation">3 + □ = 10</div>
  <div id="message" class="message">したから こたえを たたこう！</div>
</div>

<div class="bottom-area">
  <div class="controls">
    <button id="startBtn">スタート</button>
    <button id="pauseBtn" class="secondary">いったん とめる</button>
    <button id="nextBtn" class="orange">つぎへ</button>
    <button id="retryBtn" class="secondary">もういちど</button>
  </div>

  <div class="status">
    もんだい <span id="currentIndex">1</span> / <span id="totalCount">10</span>
  </div>

  <div id="board" class="board"></div>
</div>

<div id="overlay" class="overlay">
  <div class="overlay-card">
    <div id="overlayTitle" class="overlay-title">せいかい！</div>
    <div id="overlayText" class="overlay-text">よくできました</div>
    <div class="overlay-buttons">
      <button id="overlayNextBtn">つぎのもんだい</button>
      <button id="overlayRetryBtn" class="secondary">もういちど</button>
    </div>
  </div>
</div>

<script>
const problems = [
  { count: 1 },
  { count: 2 },
  { count: 3 },
  { count: 4 },
  { count: 5 },
  { count: 6 },
  { count: 7 },
  { count: 8 },
  { count: 9 },
  { count: 4 }
];

const HOLE_COUNT = 8;
const SHOW_INTERVAL = 700;
const SHOW_DURATION = 1100;
const CORRECT_APPEAR_RATE = 0.35;

const board = document.getElementById("board");
const equation = document.getElementById("equation");
const message = document.getElementById("message");
const currentIndexEl = document.getElementById("currentIndex");
const totalCountEl = document.getElementById("totalCount");

const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayText = document.getElementById("overlayText");
const overlayNextBtn = document.getElementById("overlayNextBtn");
const overlayRetryBtn = document.getElementById("overlayRetryBtn");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const nextBtn = document.getElementById("nextBtn");
const retryBtn = document.getElementById("retryBtn");

let currentProblemIndex = 0;
let spawnTimer = null;
let running = false;
let holes = [];

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function correctAnswer() {
  return 10 - problems[currentProblemIndex].count;
}

function buildBoard() {
  board.innerHTML = "";
  holes = [];

  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement("div");
    hole.className = "hole";

    const mole = document.createElement("div");
    mole.className = "mole";
    mole.textContent = "";

    mole.addEventListener("pointerdown", () => {
      if (!mole.classList.contains("show")) return;
      handleTap(mole);
    });

    hole.appendChild(mole);
    board.appendChild(hole);
    holes.push({ hole, mole, timer: null, busy: false });
  }
}

function loadProblem(index) {
  currentProblemIndex = index;
  const p = problems[currentProblemIndex];

  equation.textContent = `${p.count} + □ = 10`;
  message.textContent = "したから こたえを たたこう！";
  currentIndexEl.textContent = currentProblemIndex + 1;
  totalCountEl.textContent = problems.length;

  hideOverlay();
  clearMoles();
}

function clearMoles() {
  holes.forEach(h => {
    clearTimeout(h.timer);
    h.busy = false;
    h.mole.className = "mole";
    h.mole.textContent = "";
  });
}

function startGame() {
  if (running) return;
  running = true;
  spawnLoop();
  spawnTimer = setInterval(spawnLoop, SHOW_INTERVAL);
}

function pauseGame() {
  running = false;
  clearInterval(spawnTimer);
  spawnTimer = null;
}

function retryProblem() {
  pauseGame();
  loadProblem(currentProblemIndex);
  startGame();
}

function nextProblem() {
  pauseGame();
  if (currentProblemIndex < problems.length - 1) {
    loadProblem(currentProblemIndex + 1);
    startGame();
  } else {
    showOverlay("おしまい！", "ぜんぶ できました！");
  }
}

function getWrongNumbers(target) {
  const nums = [];
  for (let i = 0; i <= 10; i++) {
    if (i !== target) nums.push(i);
  }
  return shuffle(nums);
}

function spawnLoop() {
  const freeHoles = holes.filter(h => !h.busy);
  if (freeHoles.length === 0) return;

  const target = correctAnswer();
  const wrongs = getWrongNumbers(target);

  const hole = freeHoles[Math.floor(Math.random() * freeHoles.length)];
  const mole = hole.mole;

  hole.busy = true;
  mole.className = "mole";

  let value;
  if (Math.random() < CORRECT_APPEAR_RATE) {
    value = target;
  } else {
    value = wrongs[Math.floor(Math.random() * wrongs.length)];
  }

  mole.textContent = value;
  mole.classList.add("show");

  hole.timer = setTimeout(() => {
    mole.className = "mole";
    mole.textContent = "";
    hole.busy = false;
  }, SHOW_DURATION);
}

function handleTap(mole) {
  const tapped = Number(mole.textContent);
  const target = correctAnswer();

  if (tapped === target) {
    mole.classList.remove("wrong");
    mole.classList.add("correct");
    message.textContent = "せいかい！";
    pauseGame();
    setTimeout(() => {
      showOverlay("せいかい！", `${problems[currentProblemIndex].count} と ${target} で 10`);
    }, 250);
  } else {
    mole.classList.remove("correct");
    mole.classList.add("wrong");
    message.textContent = "ちがうよ";
    setTimeout(() => {
      if (!overlay.classList.contains("show")) {
        message.textContent = "したから こたえを たたこう！";
      }
    }, 500);
  }
}

function showOverlay(title, text) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  overlay.classList.add("show");
}

function hideOverlay() {
  overlay.classList.remove("show");
}

startBtn.addEventListener("click", startGame);
pauseBtn.addEventListener("click", pauseGame);
nextBtn.addEventListener("click", nextProblem);
retryBtn.addEventListener("click", retryProblem);
overlayNextBtn.addEventListener("click", () => {
  hideOverlay();
  nextProblem();
});
overlayRetryBtn.addEventListener("click", () => {
  hideOverlay();
  retryProblem();
});

buildBoard();
loadProblem(0);
</script>

</body>
</html>
